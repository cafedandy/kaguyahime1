    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      flex-direction: column;

        .site-title {

    .hero-img {
      width: 100%; max-width: 480px; display: block;
      margin: 0 auto 2rem; border-radius: 12px;
    }
    .hero-label {
      font-size: 12px; color: #888; letter-spacing: 0.1em;

    }

      border-radius: 8px; padding: 6px 8px;
      font-size: 22px; font-weight: 600; color: #111;
      width: 100%; min-width: 0; text-align: center;
      transition: border-color 0.15s;
    }
    .dim-input:focus { outline: none; border-color: #aaa; }

      width: 100%; padding: 14px;

      font-size: 16px; font-weight: 600; color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.15s, transform 0.1s;
    }
    .search-btn:hover { background: #6b1010; }
    .search-btn:active { transform: scale(0.99); }

      .dim-grid { grid-template-columns: 1fr; }

<script>
  function getVals() {
    return {
      h: parseInt(document.getElementById('height').value) || 0,
      w: parseInt(document.getElementById('width').value) || 0,
      d: parseInt(document.getElementById('depth').value) || 0,
      tol: 1
    };
  }

  function buildRakutenUrl(query) {
    var affiliateBase = 'https://hb.afl.rakuten.co.jp/hgc/0ef704ca.d0831a99.0ef704cb.c5f7f158/';
    // 100804=家具・インテリア カテゴリに絞り込み
    var searchUrl = 'https://search.rakuten.co.jp/search/mall/' + encodeURIComponent(query) + '/100804/';
    return affiliateBase + '?pc=' + encodeURIComponent(searchUrl) + '&link_type=hybrid_url&ut=eyJwYWdlIjoidXJsIiwidHlwZSI6Imh5YnJpZF91cmwiLCJjb2wiOjF9';
  }

  function buildMainQuery() {
    const { h, w, d, tol } = getVals();
    let q = '収納';
    if (h > 0) q += ' 高さ' + (h - tol) + '〜' + h + 'cm ' + ((h - tol) * 10) + '〜' + (h * 10) + 'mm';
    if (w > 0) q += ' 幅' + (w - tol) + '〜' + w + 'cm ' + ((w - tol) * 10) + '〜' + (w * 10) + 'mm';
    if (d > 0) q += ' 奥行' + (d - tol) + '〜' + d + 'cm ' + ((d - tol) * 10) + '〜' + (d * 10) + 'mm';
    return q;
  }

  document.getElementById('mainSearchBtn').addEventListener('click', () => {
    window.open(buildRakutenUrl(buildMainQuery()), '_blank');
  });
</script>
